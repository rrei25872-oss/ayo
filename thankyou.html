<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You!</title>
<link rel="stylesheet" href="style.css">
<style>
body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(to right, #0f172a, #1e293b);
    color: #f1f5f9;
    text-align: center;
    padding: 20px;
}

.thank-image {
    max-width: 250px;
    width: 100%;
    margin-bottom: 30px;
}

h1 { font-size: 2.5rem; margin-bottom: 15px; color: #38bdf8; }
p { font-size: 1.2rem; margin-bottom: 25px; }

.btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: bold;
    color: white;
    text-decoration: none;
    background: linear-gradient(90deg, #facc15, #f59e0b);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}
</style>
</head>
<body>
<img src="thankyou.jpeg" alt="Thank You" class="thank-image">
<h1>🎉 Thank You!</h1>
<p>Your answers have been successfully submitted. We appreciate your feedback on scam awareness.</p>
<a href="index.html" class="btn">Back to Home</a>
</body>
</html>
